on:
    release:
        types:
            - published

name: release

jobs:
    pypi:
        name: upload release to PyPI
        runs-on: ubuntu-slim
        environment: pypi
        permissions:
            id-token: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

            - name: build
              run: uv build

            - name: publish
              run: uv publish
