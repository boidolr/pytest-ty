on:
    release:
        types:
            - published

name: release

jobs:
    pypi:
        name: upload release to PyPI
        runs-on: ubuntu-slim
        environment: pypi
        permissions:
            id-token: write
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

            - name: build
              run: uv build

            - name: publish
              run: uv publish
