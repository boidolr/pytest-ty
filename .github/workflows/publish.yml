on:
    release:
        types:
            - published

name: release

jobs:
    pypi:
        name: upload release to PyPI
        runs-on: ubuntu-slim
        environment: pypi
        permissions:
            id-token: write
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

            - name: build
              run: uv build

            - name: publish
              run: uv publish
