name: main

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    schedule:
        - cron: "15 7 */9 * *"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-slim
        strategy:
            matrix:
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t", "3.15", "pypy-3.11"]
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Python
              uses: astral-sh/setup-uv@v7
              with:
                  cache-suffix: "${{ matrix.python-version }}-"

            - name: Cache tox environments
              uses: actions/cache@v5
              with:
                  path: .tox
                  key: ${{ runner.os }}-${{ matrix.python-version }}-tox-${{ hashFiles('pyproject.toml') }}

            - name: Test
              run: uvx --with tox-gh-actions --with tox-uv tox -v
