name: main

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    schedule:
        - cron: "15 7 */9 * *"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    test:
        strategy:
            matrix:
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t", "3.15", "pypy-3.11"]
                runner: [ubuntu-slim]
                include:
                    - python-version: "3.14"
                      runner: macos-latest
                    - python-version: "3.14"
                      runner: windows-latest
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 5
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Setup Python
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
              with:
                  cache-suffix: "${{ matrix.python-version }}-"

            - name: Cache tox environments
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: .tox
                  key: ${{ runner.os }}-${{ matrix.python-version }}-tox-${{ hashFiles('pyproject.toml', 'tox.ini') }}

            - name: Install tox
              run: uv tool install --python ${{ matrix.python-version }} --with tox-gh-actions --with tox-uv-bare tox

            - name: Test
              run: tox
