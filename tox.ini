# For more information about tox, see https://tox.readthedocs.io/en/latest/
[tox]
isolated_build = true
envlist = py{310,311,312,313,314,314t,315}-pytest{7,8,9},pypy3,check,format,type
requires =
    tox>=4
    tox-uv>=1

[testenv]
commands = pytest {posargs:tests}
runner = uv-venv-runner
deps =
    pytest7: pytest>=7.0.0,<8.0.0
    pytest8: pytest>=8.0.0,<9.0.0
    pytest9: pytest>=9.0.0,<10.0.0
    pytest-cov

[testenv:check]
skip_install = true
deps = ruff
commands = ruff check

[testenv:format]
skip_install = true
deps = ruff
commands = ruff format --check

[testenv:type]
deps = ty
commands = ty check

[gh-actions]
python =
    3.10: py310, type
    3.11: py311, type
    3.12: py312, type
    3.13: py313, type
    3.14: py314, check, format, type
    3.14t: py314t
    3.15: py315
    pypy-3.11: pypy3
